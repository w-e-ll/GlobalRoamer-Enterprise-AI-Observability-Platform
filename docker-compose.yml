services:
  postgres:
    image: postgres:17
    container_name: globalroamer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  migration:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: globalroamer-migration
    env_file:
      - .env
    volumes:
      - ./globalroamer_platform:/app/globalroamer_platform
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: globalroamer-api
    env_file:
      - .env
    command:
      ["uvicorn", "globalroamer_platform.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./globalroamer_platform:/app/globalroamer_platform
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
