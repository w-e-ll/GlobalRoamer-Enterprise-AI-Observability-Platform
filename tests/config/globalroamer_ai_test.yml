env: TEST

paths:
  base_dir: .test-runtime

  input_trace_dir: ${base_dir}/input/traces
  input_result_dir: ${base_dir}/input/results
  input_report_dir: ${base_dir}/input/reports
  input_template_dir: ${base_dir}/input/templates
  input_campaign_dir: ${base_dir}/input/campaign_metadata

  normalized_dir: ${base_dir}/data/normalized_events
  chunks_dir: ${base_dir}/data/chunks
  embeddings_dir: ${base_dir}/data/embeddings
  vector_db_dir: ${base_dir}/data/vector_db

  ai_summary_dir: ${base_dir}/output/ai_summaries
  root_cause_dir: ${base_dir}/output/root_cause_reports
  campaign_health_dir: ${base_dir}/output/campaign_health
  log_dir: ${base_dir}/log

ai:
  embedding_model: "test-embedding-model"
  llm_model: "test-llm-model"
  chunk_size: 2000
  chunk_overlap: 200

vector_db:
  provider: "chromadb"
  collection_name: "globalroamer_test_traces"
  persist_directory: "${base_dir}/data/vector_db"

processing:
  supported_trace_extensions:
    - ".csv"
    - ".log"
    - ".txt"

  supported_result_extensions:
    - ".json"
    - ".csv"
    - ".txt"

  save_normalized_json: true
  save_chunks: true
  max_trace_file_size_mb: 200
  max_chunk_count_per_trace: 500

logging:
  level: "INFO"
  format: "text"
  rotation_mb: 5
  backup_count: 1

health:
  enabled: true
  database_check_enabled: true
  database_timeout_seconds: 3.0
  include_environment: true

metrics:
  enabled: false
  endpoint_path: "/metrics"
  include_in_schema: false
  namespace: "globalroamer"
  subsystem: "platform_test"

telemetry:
  enabled: false
  service_name: "globalroamer-platform-test"
  service_version: "0.1.0-test"
  otlp_endpoint: null
  trace_sample_ratio: 1.0
  instrument_fastapi: false
  instrument_sqlalchemy: false
  instrument_httpx: false

campaign_health:
  degraded_threshold: 0.75
  critical_threshold: 0.50

retry_intelligence:
  min_historical_matches: 3
  low_retry_success_threshold: 0.05
  cooldown_minutes: 30
